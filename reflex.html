<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hayden reflexes</title>
    <meta charset="UTF-8">
</head>
<body>

    <h1>Hayden reflexes</h1>

    <div id="target">Your time</div>
    <div id="counter">Count</div>
    <br>

    <button onclick="beginTime()">Go</button>
    <button onclick="recordTime()">Halt</button>

    <script>
        let haltTime = undefined;

        function recordTime() {
            haltTime = Date.now();
            console.log(haltTime);
        }

        function beginTime() {
            haltTime = undefined;

            for (let i = 0; i <= 5; i++) {
                setTimeout(function () {
                    document.getElementById("counter").innerHTML = i;
                }, (5 - i) * 1000);
            }

            setTimeout(function () {
                if (haltTime === undefined) {
                    document.getElementById("target").innerHTML = "Not soon enough";
                } else {
                    let targetTime = Date.now();
                    let elapsedTime = targetTime - haltTime;
                    document.getElementById("target").innerHTML = "Time was " + elapsedTime;
                }
            }, 5000);
        }
    </script>

</body>
</html>
