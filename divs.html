<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hayden builds list with divs</title>
    <meta charset="UTF-8">

    <style>
        .flex-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .divlist {
            padding: 10px;
            border: 2px solid black;
            background-color: lightblue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Hayden builds list with divs</h1>

<input type="text" id="inputText" placeholder="Enter item">
<button onclick="addFront()">Add front</button>
<button onclick="addEnd()">Add end</button>
<button onclick="removeEnd()">Remove</button>

<div class="flex-container" id="container">
    <div class="divlist">Item 1</div>
    <div class="divlist">Item 2</div>
</div>

<script>

    function addEnd(){

        let newDiv = document.createElement("div");
        let text = document.getElementById("inputText").value;
        newDiv.innerHTML = text;
        newDiv.className = "divlist";
        document.getElementById("container").appendChild(newDiv);
    }
    function addFront(){
        let newDiv = document.createElement("div");
        let text = document.getElementById("inputText").value;
        newDiv.innerHTML = text;
        newDiv.className = "divlist";
        let container = document.getElementById("container");
        container.insertBefore(newDiv, container.firstChild);
    }
    function removeEnd(){
        let container = document.getElementById("container");
        if (container.lastElementChild) {
            container.removeChild(container.lastElementChild);
        }
    }

</script>

</body>
</html>
